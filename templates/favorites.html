{% extends "base.html" %}
{% block title %}My Favorites - FeVid{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/{{ version }}/css/index.css">
<link rel="stylesheet" href="/static/{{ version }}/css/galleries.css">
<link rel="stylesheet" href="/static/{{ version }}/css/favorites.css">
{% endblock %}
{% block content %}
<div class="fav-toggle">
  <button class="fav-toggle-btn{% if active_tab == "videos" %} active{% endif %}" data-tab="videos">Videos ({{ video_count }})</button>
  <button class="fav-toggle-btn{% if active_tab == "galleries" %} active{% endif %}" data-tab="galleries">Galleries ({{ gallery_count }})</button>
</div>

<div class="fav-panel{% if active_tab != "videos" %} hidden{% endif %}" id="panel-videos">
  <div class="video-grid" id="favVideoGrid"></div>
  <div class="fav-loader" id="favVideoLoader" style="display:none">Loading videos...</div>
  <div class="empty-state" id="favVideoEmpty" style="display:none">No favorite videos yet.</div>
  <div class="fav-sentinel" id="favVideoSentinel"></div>
</div>

<div class="fav-panel{% if active_tab != "galleries" %} hidden{% endif %}" id="panel-galleries">
  <div class="gallery-grid" id="favGalleryGrid"></div>
  <div class="fav-loader" id="favGalleryLoader" style="display:none">Loading galleries...</div>
  <div class="empty-state" id="favGalleryEmpty" style="display:none">No favorite galleries yet.</div>
  <div class="fav-sentinel" id="favGallerySentinel"></div>
</div>

<script>
(function () {
  var activeTab = '{{ active_tab }}';

  // ---- toggle switch ----
  var toggles = document.querySelectorAll('.fav-toggle-btn');
  toggles.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var tab = this.getAttribute('data-tab');
      if (tab === activeTab) return;
      toggles.forEach(function (t) { t.classList.remove('active'); });
      this.classList.add('active');
      document.querySelectorAll('.fav-panel').forEach(function (p) { p.classList.add('hidden'); });
      var panel = document.getElementById('panel-' + tab);
      if (panel) panel.classList.remove('hidden');
      activeTab = tab;
      var url = new URL(window.location);
      url.searchParams.set('tab', tab);
      window.history.replaceState(null, '', url);
      var grid = document.getElementById('fav' + (tab === 'videos' ? 'Video' : 'Gallery') + 'Grid');
      if (grid && grid.children.length === 0) loadNext(tab);
    });
  });

  // ---- infinite scroll ----
  var loading = { videos: false, galleries: false };
  var hasMore = { videos: true, galleries: true };
  var offsets = { videos: 0, galleries: 0 };

  function loadNext(tab) {
    if (loading[tab] || !hasMore[tab]) return;
    loading[tab] = true;
    var loader = document.getElementById('fav' + (tab === 'videos' ? 'Video' : 'Gallery') + 'Loader');
    var grid = document.getElementById('fav' + (tab === 'videos' ? 'Video' : 'Gallery') + 'Grid');
    var empty = document.getElementById('fav' + (tab === 'videos' ? 'Video' : 'Gallery') + 'Empty');
    if (loader) loader.style.display = '';
    fetch('/api/favorites?tab=' + tab + '&offset=' + offsets[tab] + '&limit=20')
      .then(function (r) { return r.json(); })
      .then(function (resp) {
        if (!resp.ok) return;
        if (resp.html) {
          grid.insertAdjacentHTML('beforeend', resp.html);
          grid.querySelectorAll('.video-card[data-preview="true"]').forEach(function (card) {
            if (!card.dataset.hoverSetup) {
              card.dataset.hoverSetup = '1';
              setupHover(card);
            }
          });
          /* ── Handle image loading for dynamically added cards ── */
          grid.querySelectorAll('.thumb-img:not(.loaded), .gallery-card-img:not(.loaded)').forEach(function (img) {
            var parent = img.closest('.thumbnail') || img.closest('.gallery-card-thumb');
            if (parent) {
              parent.classList.add('loading');
              parent.classList.remove('loaded');
            }
            function onDone() {
              img.classList.add('loaded');
              if (parent) {
                parent.classList.remove('loading');
                parent.classList.add('loaded');
              }
            }
            if (img.complete && img.naturalWidth > 0) {
              onDone();
            } else {
              img.addEventListener('load', onDone);
              img.addEventListener('error', onDone);
            }
          });
          offsets[tab] += 20;
        }
        hasMore[tab] = resp.has_more;
        if (grid.children.length === 0) {
          if (empty) empty.style.display = '';
        } else {
          if (empty) empty.style.display = 'none';
        }
      })
      .catch(function () {})
      .finally(function () {
        loading[tab] = false;
        if (loader) loader.style.display = 'none';
      });
  }

  // Initial load for active tab
  loadNext(activeTab);

  // Sentinel observer
  var sentinelVid = document.getElementById('favVideoSentinel');
  var sentinelGal = document.getElementById('favGallerySentinel');
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (!entry.isIntersecting) return;
      var tab = entry.target.id === 'favVideoSentinel' ? 'videos' : 'galleries';
      loadNext(tab);
    });
  }, { rootMargin: '400px' });
  if (sentinelVid) observer.observe(sentinelVid);
  if (sentinelGal) observer.observe(sentinelGal);

  // hover preview for video cards loaded via JS
  function setupHover(card) {
    var video = card.querySelector('.thumb-preview');
    var spinner = card.querySelector('.thumb-spinner');
    if (!video) return;
    card.addEventListener('mouseenter', function () {
      video.currentTime = 0;
      if (spinner) spinner.classList.add('active');
      video.play().catch(function () {});
    });
    card.addEventListener('mouseleave', function () {
      video.pause();
      video.currentTime = 0;
      if (spinner) spinner.classList.remove('active');
    });
    video.addEventListener('playing', function () {
      if (spinner) spinner.classList.remove('active');
    });
  }
})();
</script>
{% endblock %}
