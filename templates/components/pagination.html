{% if pagination.total_pages > 1 %}
<div class="pagination" id="pagination">
  {% if pagination.current_page > 1 %}
  <a href="{{ pagination.base_path }}?page={{ pagination.current_page - 1 }}&limit={{ pagination.limit }}{{ pagination.query_params }}"
    class="page-btn" data-page="prev">Prev</a>
  {% endif %}
  <div class="page-btns-wrap" id="pageBtnsWrap">
    {% for p in pagination.pages %}
    {% if p.is_active %}
    <span class="page-btn active" data-page-num="{{ p.num }}">{{ p.num }}</span>
    {% else %}
    <a href="{{ pagination.base_path }}?page={{ p.num }}&limit={{ pagination.limit }}{{ pagination.query_params }}"
      class="page-btn" data-page-num="{{ p.num }}">{{ p.num }}</a>
    {% endif %}
    {% endfor %}
  </div>
  <form class="page-jump" onsubmit="return jumpToPage(this)">
    <input type="number" class="page-jump-input" min="1" max="{{ pagination.total_pages }}" placeholder="Go to" aria-label="Go to page">
    <button type="submit" class="page-jump-btn" aria-label="Go">
      <svg class="icon icon--sm" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
        <rect width="256" height="256" fill="none"/>
        <polyline points="96 48 176 128 96 208" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/>
      </svg>
    </button>
  </form>
  {% if pagination.current_page < pagination.total_pages %}
  <a href="{{ pagination.base_path }}?page={{ pagination.current_page + 1 }}&limit={{ pagination.limit }}{{ pagination.query_params }}"
    class="page-btn" data-page="next">Next</a>
  {% endif %}
</div>

<script>
  (function() {
    function fitPageBtns() {
      var wrap = document.getElementById('pageBtnsWrap');
      if (!wrap) return;
      var pag = document.getElementById('pagination');
      var btns = wrap.querySelectorAll('.page-btn');
      if (!btns.length) return;

      // Measure available width: pagination width minus Prev/Next and jump form
      var pagW = pag.offsetWidth;

      // Get fixed elements
      var prev = pag.querySelector('[data-page="prev"]');
      var next = pag.querySelector('[data-page="next"]');
      var jumpForm = pag.querySelector('.page-jump');

      // Compute gap sizes (pagination gap is 8px)
      var fixedW = 0;
      var gapTotal = 0;

      // Count visible fixed elements
      var fixedCount = 0;
      if (prev && prev.offsetParent !== null) { fixedW += prev.offsetWidth; fixedCount++; }
      // gap after prev
      if (next && next.offsetParent !== null) { fixedW += next.offsetWidth; fixedCount++; }
      if (jumpForm && jumpForm.offsetParent !== null) { fixedW += jumpForm.offsetWidth; fixedCount++; }

      // Gaps: between all items in pagination flex (fixedCount gaps between fixed items + 1 gap to wrap)
      // pagination gap is 8px, so count gaps between flex children
      var pagGap = 8;

      // Count flex children
      var allChildren = [];
      for (var i = 0; i < pag.children.length; i++) {
        var child = pag.children[i];
        if (child.offsetParent !== null) {
          allChildren.push(child);
        }
      }

      // Gaps = (visibleChildren - 1) * pagGap
      // But we need to pre-compute how many buttons will fit, so we need iterative check

      // Measure one button width (all same size, use first)
      var btnW = btns[0].offsetWidth;
      var btnGap = 4; // gap in page-btns-wrap

      // Available width for wrap = pagW - (fixed element widths) - (gaps between visible items)
      // We need to figure out visible children count to know gap count.
      // Iterative: start with 0 buttons visible, add one at a time

      var available = pagW;

      // Subtract fixed element widths
      if (prev && prev.offsetParent !== null) available -= prev.offsetWidth;
      if (next && next.offsetParent !== null) available -= next.offsetWidth;
      if (jumpForm && jumpForm.offsetParent !== null) available -= jumpForm.offsetWidth;

      // Count how many fixed items are visible
      var fixedVisible = 0;
      if (prev && prev.offsetParent !== null) fixedVisible++;
      if (next && next.offsetParent !== null) fixedVisible++;
      if (jumpForm && jumpForm.offsetParent !== null) fixedVisible++;

      // We'll figure out how many buttons fit:
      // Total layout: [fixed items with gaps between them] + [wrap with its buttons]
      // The wrap's own gap is internal, handled inside the wrap width.
      // So: available = pagW - sum(fixed widths) - (fixedVisible * pagGap) - pagGap (gap before wrap) - pagGap (gap after wrap?)
      // Actually the flex layout puts the gap between each adjacent pair.
      // Simpler: just keep adding buttons and checking if the total width exceeds available

      // Start with all buttons hidden
      for (var i = 0; i < btns.length; i++) {
        btns[i].hidden = true;
      }

      // Add buttons one by one until they don't fit
      // The wrap width needed = btnCount * btnW + (btnCount - 1) * btnGap
      // Available for wrap = pagW - sum(fixed visible widths) - gapsCount * pagGap
      // gapsCount = number of visible flex items - 1

      // We'll just try to show as many as fit
      var maxBtns = 0;
      for (var i = 0; i < btns.length; i++) {
        var neededWidth = (i + 1) * btnW + i * btnGap;
        // How many gaps: if we have fixedVisible + 1 items (wrap counts as 1), gaps = (fixedVisible + 1)
        // Actually wrap is one element in the flex, so total visible flex items = fixedVisible + 1 (the wrap)
        // gaps = (fixedVisible + 1)
        var gapsInPag = fixedVisible + 1;
        var gapsWidth = gapsInPag * pagGap;
        var totalNeeded = neededWidth + fixedW + gapsWidth;
        if (totalNeeded <= pagW) {
          maxBtns = i + 1;
        } else {
          break;
        }
      }

      for (var i = 0; i < maxBtns && i < btns.length; i++) {
        btns[i].hidden = false;
      }
    }

    fitPageBtns();
    var resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(fitPageBtns, 100);
    });
  })();

  function jumpToPage(form) {
    var input = form.querySelector('.page-jump-input');
    var page = parseInt(input.value, 10);
    if (isNaN(page) || page < 1) page = 1;
    var max = parseInt(input.max, 10);
    if (page > max) page = max;
    var url = new URL(window.location.href);
    url.searchParams.set('page', page);
    window.location.href = url.toString();
    return false;
  }
</script>
{% endif %}
