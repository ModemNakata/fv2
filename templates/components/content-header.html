<div class="content-header">
  <div class="content-header-count">
    {% if search_query.is_empty() %}
      {{ total_count }} {{ content_type_label }}
    {% else %}
      {{ total_count }} {{ content_type_label }} for "{{ search_query }}"
    {% endif %}
  </div>
  <div class="content-header-sort">
    <form method="GET" class="sort-form" id="sortForm">
      {% if !search_query.is_empty() %}
      <input type="hidden" name="q" value="{{ search_query }}">
      {% endif %}
      <input type="hidden" name="limit" value="{{ pagination.limit }}">
      <select name="sort_order" class="sort-select" id="sortSelect" onchange="this.form.submit()">
        {% for opt in sort_options %}
        <option value="{{ opt.value }}"{% if opt.active %} selected{% endif %}>{{ opt.label }}</option>
        {% endfor %}
      </select>
    </form>
  </div>
</div>
