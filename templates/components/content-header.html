<div class="content-header">
  <div class="content-header-count">
    {% if search_query.is_empty() %}
      {{ total_count }} {{ content_type_label }}
    {% else %}
      {{ total_count }} {{ content_type_label }} for "{{ search_query }}"
    {% endif %}
  </div>
  <div class="content-header-sort">
    <select class="sort-select" id="sortSelect">
      {% for opt in sort_options %}
      <option value="{{ opt.value }}"{% if opt.active %} selected{% endif %}>{{ opt.label }}</option>
      {% endfor %}
    </select>
  </div>
</div>
