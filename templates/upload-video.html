{% extends "base.html" %}

{% block title %}Upload Video - FeVid{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/upload-video.css">
{% endblock %}

{% block content %}
<div class="upload-page">
  <h1 class="upload-heading">Upload Video</h1>
  <form class="upload-form" id="uploadForm" action="/upload/video" method="post" enctype="multipart/form-data">
    <div class="upload-dropzone" id="videoDropzone">
      <svg class="icon upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
        <rect width="256" height="256" fill="none"/>
        <line x1="128" y1="144" x2="128" y2="32" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/>
        <polyline points="216 144 216 208 40 208 40 144" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/>
        <polyline points="88 72 128 32 168 72" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/>
      </svg>
      <p class="upload-text">Drag & drop a video or <span class="upload-link">browse</span></p>
      <p class="upload-hint">Encoded to HLS (H.264) — up to 10GB</p>
      <input type="file" id="videoFileInput" name="file" class="upload-file-input" hidden>
    </div>
    <div class="upload-fields">
      <input type="text" name="title" class="upload-input" placeholder="Video title" required>
      <textarea name="description" class="upload-textarea" placeholder="Description"></textarea>
    </div>
    <button type="submit" class="upload-submit">Upload</button>
  </form>
  <script>
    (function() {
      var dropzone = document.getElementById('videoDropzone');
      var fileInput = document.getElementById('videoFileInput');
      var form = document.getElementById('uploadForm');
      var btn = form.querySelector('.upload-submit');

      dropzone.addEventListener('click', function() {
        fileInput.click();
      });

      fileInput.addEventListener('change', function() {
        if (fileInput.files.length > 0) {
          btn.textContent = 'Upload ' + fileInput.files[0].name;
          btn.disabled = false;
        }
      });

      // Disable button until a file is selected
      btn.disabled = true;

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.textContent = 'Uploading...';

        var fd = new FormData(form);

        fetch(form.action, { method: 'POST', body: fd })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.ok && data.content_id) {
              window.location.href = '/video?id=' + data.content_id;
            } else {
              alert(data.error || 'Upload failed');
              btn.disabled = false;
              btn.textContent = 'Upload';
            }
          })
          .catch(function() {
            alert('Network error');
            btn.disabled = false;
            btn.textContent = 'Upload';
          });
      });
    })();
  </script>
{% endblock %}
