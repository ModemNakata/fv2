{% extends "base.html" %}

{% block title %}Upload Video - FeVid{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/{{ version }}/css/upload-video.css">
{% endblock %}

{% block content %}
<div class="upload-page">
  <h1 class="upload-heading">Upload Video</h1>
  <form class="upload-form" id="uploadForm" action="/upload/video" method="post" enctype="multipart/form-data">
    <div class="upload-dropzone" id="videoDropzone">
      <div class="dropzone-default" id="dropzoneDefault">
        <svg class="icon upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
          <rect width="256" height="256" fill="none" />
          <line x1="128" y1="144" x2="128" y2="32" fill="none" stroke="currentColor" stroke-linecap="round"
            stroke-linejoin="round" stroke-width="16" />
          <polyline points="216 144 216 208 40 208 40 144" fill="none" stroke="currentColor" stroke-linecap="round"
            stroke-linejoin="round" stroke-width="16" />
          <polyline points="88 72 128 32 168 72" fill="none" stroke="currentColor" stroke-linecap="round"
            stroke-linejoin="round" stroke-width="16" />
        </svg>
        <p class="upload-text">Drag & drop a video or <span class="upload-link">browse</span></p>
        <p class="upload-hint" id="uploadHint">Encoded to WebM (AV1) — up to {{ max_upload_size_video_display }}</p>
      </div>
      <div class="dropzone-file" id="dropzoneFile" hidden>
        <svg class="icon file-selected-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
          <rect width="256" height="256" fill="none" />
          <polygon points="160 112 112 80 112 144 160 112" fill="none" stroke="currentColor" stroke-linecap="round"
            stroke-linejoin="round" stroke-width="16" />
          <rect x="32" y="48" width="192" height="128" rx="8" fill="none" stroke="currentColor" stroke-linecap="round"
            stroke-linejoin="round" stroke-width="16" />
          <line x1="32" y1="208" x2="224" y2="208" fill="none" stroke="currentColor" stroke-linecap="round"
            stroke-linejoin="round" stroke-width="16" />
        </svg>
        <p class="file-selected-name" id="fileName"></p>
        <p class="file-selected-size" id="fileSize"></p>
      </div>
      <input type="file" id="videoFileInput" name="file" accept="video/*" hidden>
    </div>
    <div class="upload-fields">
      <input type="text" name="title" class="upload-input" placeholder="Video title" required>
      <textarea name="description" class="upload-textarea" placeholder="Description (optional)"></textarea>
      <div class="upload-field-row">
        <label class="upload-label" for="videoPrice">Price (USD)</label>
        <span class="price-prefix">$</span>
        <input type="number" id="videoPrice" name="price" class="upload-input price-input" value="0" min="0" step="0.01">
      </div>
      <div class="conditional-fields" id="videoConditionalFields" hidden>
        <div class="upload-field-row">
          <label class="upload-label" for="previewLength">Free preview duration</label>
          <div class="range-wrapper">
            <input type="range" id="previewLength" name="preview_length" class="upload-range" min="5" max="60"
              value="5">
            <span class="upload-range-value" id="previewLengthValue">5s</span>
          </div>
        </div>
        <p class="validation-error" id="videoValidationError" hidden></p>
      </div>
    </div>
    <button type="submit" class="upload-submit">Upload</button>
    <div class="progress-container" id="progressContainer" hidden>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <p class="progress-text" id="progressText"></p>
    </div>
  </form>
  <script>
    (function () {
      var MAX_SIZE = {{ max_upload_size_video }};
      var dropzone = document.getElementById('videoDropzone');
      var fileInput = document.getElementById('videoFileInput');
      var form = document.getElementById('uploadForm');
      var btn = form.querySelector('.upload-submit');
      var defaultView = document.getElementById('dropzoneDefault');
      var fileView = document.getElementById('dropzoneFile');
      var fileName = document.getElementById('fileName');
      var fileSize = document.getElementById('fileSize');
      var uploadHint = document.getElementById('uploadHint');

      function formatSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        var k = 1024;
        var sizes = ['Bytes', 'KB', 'MB', 'GB'];
        var i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + '\u00A0' + sizes[i];
      }

      function showFile(file) {
        if (file.size > MAX_SIZE) {
          fileName.textContent = '';
          fileSize.textContent = 'File too large (' + formatSize(file.size) + ') — max ' + formatSize(MAX_SIZE);
          defaultView.hidden = true;
          fileView.hidden = false;
          btn.textContent = 'File exceeds upload limit';
          btn.disabled = true;
          return;
        }
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
        defaultView.hidden = true;
        fileView.hidden = false;
        btn.textContent = 'Upload ' + file.name;
        btn.disabled = false;
      }

      dropzone.addEventListener('click', function () {
        fileInput.click();
      });

      fileInput.addEventListener('change', function () {
        if (fileInput.files.length > 0) showFile(fileInput.files[0]);
      });

      dropzone.addEventListener('dragover', function (e) {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });

      dropzone.addEventListener('dragleave', function () {
        dropzone.classList.remove('dragover');
      });

      dropzone.addEventListener('drop', function (e) {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
          var f = e.dataTransfer.files[0];
          fileInput.files = e.dataTransfer.files;
          showFile(f);
        }
      });

      // Start disabled until a file is selected
      btn.disabled = true;

      // --- price & preview length ---
      var videoDuration = null;
      var priceInput = document.getElementById('videoPrice');
      var conditionalFields = document.getElementById('videoConditionalFields');
      var previewLength = document.getElementById('previewLength');
      var previewLengthValue = document.getElementById('previewLengthValue');
      var validationError = document.getElementById('videoValidationError');

      function getVideoDuration(file) {
        return new Promise(function (resolve) {
          var video = document.createElement('video');
          video.preload = 'metadata';
          video.onloadedmetadata = function () {
            window.URL.revokeObjectURL(video.src);
            resolve(video.duration);
          };
          video.onerror = function () {resolve(null);};
          video.src = URL.createObjectURL(file);
        });
      }

      function validateVideo() {
        var price = parseFloat(priceInput.value) || 0;
        if (price <= 0 || videoDuration === null) {
          validationError.hidden = true;
          if (fileInput.files.length) btn.disabled = false;
          return true;
        }
        var preview = parseInt(previewLength.value) || 0;
        if (preview > videoDuration / 2) {
          validationError.textContent = 'Video must be at least ' + (preview * 2) + 's long for a ' + preview + 's preview';
          validationError.hidden = false;
          btn.disabled = true;
          return false;
        }
        validationError.hidden = true;
        btn.disabled = false;
        return true;
      }

      function toggleVideoConditional() {
        var price = parseFloat(priceInput.value) || 0;
        conditionalFields.hidden = price <= 0;
        validateVideo();
      }

      priceInput.addEventListener('input', toggleVideoConditional);

      previewLength.addEventListener('input', function () {
        previewLengthValue.textContent = previewLength.value + 's';
        validateVideo();
      });

      // Patch showFile to detect duration
      var origShowFile = showFile;
      showFile = function (file) {
        origShowFile(file);
        videoDuration = null;
        btn.disabled = true;
        btn.textContent = 'Detecting duration...';
        getVideoDuration(file).then(function (dur) {
          videoDuration = dur;
          if (dur === null) {
            btn.disabled = false;
            btn.textContent = 'Upload ' + file.name;
            return;
          }
          btn.textContent = 'Upload ' + file.name;
          validateVideo();
        });
      };

      toggleVideoConditional();

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!validateVideo()) {btn.disabled = false; return;}
        var dropzone = document.getElementById('videoDropzone');
        var progressContainer = document.getElementById('progressContainer');
        var progressFill = document.getElementById('progressFill');
        var progressText = document.getElementById('progressText');

        var file = fileInput.files[0];
        var ext = file.name.split('.').pop().toLowerCase();

        dropzone.style.display = 'none';
        progressContainer.hidden = false;
        btn.disabled = true;
        btn.textContent = 'Initializing...';
        form.querySelector('[name="title"]').disabled = true;
        form.querySelector('[name="description"]').disabled = true;
        priceInput.disabled = true;
        previewLength.disabled = true;

        // Step 1: Ask backend for a presigned upload URL
        fetch('/api/upload/video/init', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: form.querySelector('[name="title"]').value,
            description: form.querySelector('[name="description"]').value || null,
            price_cents: Math.round((parseFloat(priceInput.value) || 0) * 100),
            extension: ext,
            original_name: file.name,
            preview_length: parseInt(previewLength.value) || null,
            file_size: file.size,
          })
        })
        .then(function (r) { return r.json().then(function (d) { return { status: r.status, data: d }; }); })
        .then(function (res) {
          if (res.status < 200 || res.status >= 300 || !res.data.files || !res.data.files.length) {
            alert(res.data.error || 'Failed to initialize upload');
            resetUploadUI();
            return;
          }
          var contentId = res.data.content_id;
          var uploadUrl = res.data.files[0].upload_url;

          // Step 2: Upload file directly to S3
          var xhr = new XMLHttpRequest();

          xhr.upload.addEventListener('progress', function (e) {
            if (e.lengthComputable) {
              var pct = Math.round((e.loaded / e.total) * 100);
              progressFill.style.width = pct + '%';
              btn.textContent = 'Uploading ' + pct + '%';
            }
          });

          xhr.addEventListener('load', function () {
            if (xhr.status >= 200 && xhr.status < 300) {
              // Step 3: Mark upload as complete
              fetch('/api/upload/' + contentId + '/complete', { method: 'POST' })
                .then(function (r) { return r.json(); })
                .then(function (d) {
                  if (d.ok) {
                    window.location.href = '/video/' + contentId;
                  } else {
                    alert(d.error || 'Failed to finalize');
                    resetUploadUI();
                  }
                })
                .catch(function () {
                  alert('Failed to finalize upload');
                  resetUploadUI();
                });
            } else {
              alert('S3 upload failed (HTTP ' + xhr.status + ')');
              resetUploadUI();
            }
          });

          xhr.addEventListener('error', function () {
            alert('Network error during S3 upload');
            resetUploadUI();
          });

          xhr.open('PUT', uploadUrl, true);
          xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
          xhr.send(file);
        })
        .catch(function (err) {
          alert('Failed to initialize upload');
          resetUploadUI();
        });

        function resetUploadUI() {
          dropzone.style.display = '';
          progressContainer.hidden = true;
          progressFill.style.width = '0%';
          btn.disabled = false;
          btn.textContent = 'Upload';
          form.querySelector('[name="title"]').disabled = false;
          form.querySelector('[name="description"]').disabled = false;
          priceInput.disabled = false;
          previewLength.disabled = false;
        }
      });
    })();
  </script>
  {% endblock %}
