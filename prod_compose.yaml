#production (target machine)
services:

  redis:
    image: redis:latest
    container_name: actix_redis_buffer
    # expose:
      # - "6379"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server
    deploy:
      resources:
        limits:
          cpus: '0.10' # Strictly allocate only 10% of a single CPU  core (0.50)
          memory: 128M # Limit entire container to 128 Megabytes (512M)
    # restart: always


volumes:
  redis_data:

