    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    #
    #location ~ \.php$ {
    #    root           html;
    #    fastcgi_pass   127.0.0.1:9000;
    #    fastcgi_index  index.php;
    #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
    #    include        fastcgi_params;
    #}

    # deny access to .htaccess files, if Apache's document root
    # concurs with nginx's one
    #
    #location ~ /\.ht {
    #    deny  all;
    #}

    # ⭐ NEW: Reverse Proxy Route for Local HLS S3 Storage (RustFS)
    # location /video-streams/ {
    #     # Using host.docker.internal allows Nginx inside Docker to reach port 9000 on your machine.
    #     # Alternatively, you can use your exact IP: http://192.168.1.188:9000;
    #     proxy_pass http://host.docker.internal:9000;

    #     # Forward headers so RustFS knows the real client credentials
    #     proxy_set_header Host $http_host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;

    #     # 🚀 CRITICAL HLS STREAMING OPTIMIZATIONS:
    #     proxy_buffering off;          # Prevents Nginx from trying to buffer the .ts chunks to disk
    #     proxy_http_version 1.1;       # Keeps the HTTP connection alive for faster chunk downloads
    #     proxy_set_header Connection "";
        
    #     # Max file size limit override if you ever upload raw videos via Nginx proxy endpoints
    #     client_max_body_size 0; 
    # }
    location /fevid/ {
        # ⚡ CHANGE THIS to the exact LAN IP of the machine hosting RustFS
        proxy_pass http://192.168.1.188:9000;

        # Tell RustFS the actual domain name being used by the player
        proxy_set_header Host $http_host;
        
        # Pass along real client network identification headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HLS streaming optimizations (crucial for multi-machine setups)
        proxy_buffering off;          
        proxy_http_version 1.1;       
        proxy_set_header Connection "";
        client_max_body_size 0; 
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name local.test;
    
    # Redirect all HTTP requests to HTTPS
    return 301 https://$server_name$request_uri;
}
